name: Deploy staging

on:
  workflow_dispatch:

permissions:
  contents: read
  packages: write

concurrency:
  group: fccp-staging
  cancel-in-progress: false

jobs:
  deploy:
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    environment: staging
    steps:
      - uses: actions/checkout@v4
      - name: Set image names
        run: echo "IMAGE_PREFIX=ghcr.io/${GITHUB_REPOSITORY,,}" >> "$GITHUB_ENV"
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/setup-buildx-action@v3
      - uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ env.IMAGE_PREFIX }}-api:${{ github.sha }}
      - uses: docker/build-push-action@v6
        with:
          context: web
          push: true
          tags: ${{ env.IMAGE_PREFIX }}-web:${{ github.sha }}
      - name: Configure cluster
        env: {KUBE_CONFIG: "${{ secrets.KUBE_CONFIG }}"}
        run: |
          mkdir -p "$RUNNER_TEMP/kube"
          printf '%s' "$KUBE_CONFIG" | base64 --decode > "$RUNNER_TEMP/kube/config"
          chmod 600 "$RUNNER_TEMP/kube/config"
          echo "KUBECONFIG=$RUNNER_TEMP/kube/config" >> "$GITHUB_ENV"
      - name: Apply secrets
        env:
          DATABASE_URL: "${{ secrets.STAGING_DATABASE_URL }}"
          METRICS_TOKEN: "${{ secrets.STAGING_METRICS_TOKEN }}"
        run: |
          kubectl create namespace fccp-staging --dry-run=client -o yaml | kubectl apply -f -
          kubectl -n fccp-staging create secret generic fccp-secrets --from-literal=DATABASE_URL="$DATABASE_URL" --from-literal=METRICS_TOKEN="$METRICS_TOKEN" --dry-run=client -o yaml | kubectl apply -f -
      - name: Deploy immutable images
        run: |
          kubectl apply -k deploy/k8s/overlays/staging
          kubectl -n fccp-staging set image deployment/api api=${IMAGE_PREFIX}-api:${{ github.sha }}
          kubectl -n fccp-staging set image deployment/web web=${IMAGE_PREFIX}-web:${{ github.sha }}
          kubectl -n fccp-staging rollout status deployment/api --timeout=5m
          kubectl -n fccp-staging rollout status deployment/web --timeout=5m

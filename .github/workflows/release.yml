name: Release

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write
  packages: write
  id-token: write
  attestations: write

jobs:
  release:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:17-alpine
        env:
          POSTGRES_DB: financial_crime_release
          POSTGRES_USER: financial_crime
          POSTGRES_PASSWORD: release_test_only
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U financial_crime -d financial_crime_release"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10
    env:
      TEST_DATABASE_URL: postgres://financial_crime:release_test_only@localhost:5432/financial_crime_release?sslmode=disable
      REGISTRY: ghcr.io
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.25.x"
          cache: true
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: web/package-lock.json
      - name: Verify backend
        run: go test -race -count=1 ./... && go vet ./...
      - name: Verify website
        working-directory: web
        run: npm ci && npm run build && npm audit --audit-level=high
      - name: Validate deployment configuration
        run: |
          docker compose config --quiet
          kubectl kustomize deploy/k8s/overlays/staging >/dev/null
      - name: Build release bundle
        run: |
          mkdir -p dist/package
          CGO_ENABLED=0 GOOS=linux GOARCH=amd64 go build -trimpath -ldflags="-s -w" -o dist/package/fccp-api-linux-amd64 ./cmd/api
          cp docs/openapi.yaml docs/ARCHITECTURE.md docs/DEMO.md docs/RELEASE_CHECKLIST.md dist/package/
          kubectl kustomize deploy/k8s/overlays/staging >dist/package/kubernetes-staging.yaml
          tar -C dist/package -czf "dist/fccp-${GITHUB_REF_NAME}-linux-amd64.tar.gz" .
      - name: Generate SPDX SBOM
        uses: anchore/sbom-action@v0
        with:
          path: .
          format: spdx-json
          output-file: dist/fccp-sbom.spdx.json
      - name: Create checksums
        working-directory: dist
        run: sha256sum *.tar.gz *.json >SHA256SUMS
      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Prepare image names
        id: images
        shell: bash
        run: |
          repository="${GITHUB_REPOSITORY,,}"
          echo "api=${REGISTRY}/${repository}-api:${GITHUB_REF_NAME}" >>"$GITHUB_OUTPUT"
          echo "web=${REGISTRY}/${repository}-web:${GITHUB_REF_NAME}" >>"$GITHUB_OUTPUT"
      - name: Build and publish API image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.images.outputs.api }}
      - name: Build and publish Web image
        uses: docker/build-push-action@v6
        with:
          context: web
          push: true
          tags: ${{ steps.images.outputs.web }}
      - name: Attest release bundle
        uses: actions/attest-build-provenance@v2
        with:
          subject-path: dist/fccp-${{ github.ref_name }}-linux-amd64.tar.gz
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            dist/fccp-${{ github.ref_name }}-linux-amd64.tar.gz
            dist/fccp-sbom.spdx.json
            dist/SHA256SUMS

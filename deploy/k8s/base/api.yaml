apiVersion: apps/v1
kind: Deployment
metadata: {name: api, labels: {app: fccp-api}}
spec:
  replicas: 2
  selector: {matchLabels: {app: fccp-api}}
  template:
    metadata: {labels: {app: fccp-api}}
    spec:
      securityContext: {runAsNonRoot: true, seccompProfile: {type: RuntimeDefault}}
      volumes: [{name: provider-tls, secret: {secretName: fccp-provider-tls, optional: true}}]
      containers:
        - name: api
          image: ghcr.io/andreimartynenko/financial-crime-compliance-platform-api:latest
          ports: [{name: http, containerPort: 8080}]
          envFrom: [{configMapRef: {name: fccp-config}}, {secretRef: {name: fccp-secrets}}]
          readinessProbe: {httpGet: {path: /readyz, port: http}, initialDelaySeconds: 5, periodSeconds: 10}
          livenessProbe: {httpGet: {path: /healthz, port: http}, initialDelaySeconds: 10, periodSeconds: 20}
          resources: {requests: {cpu: 100m, memory: 128Mi}, limits: {cpu: 1000m, memory: 512Mi}}
          securityContext: {allowPrivilegeEscalation: false, readOnlyRootFilesystem: true, capabilities: {drop: [ALL]}}
          volumeMounts: [{name: provider-tls, mountPath: /var/run/secrets/fccp-provider, readOnly: true}]
      terminationGracePeriodSeconds: 30
---
apiVersion: v1
kind: Service
metadata: {name: api}
spec: {selector: {app: fccp-api}, ports: [{name: http, port: 8080, targetPort: http}]}
---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata: {name: api}
spec: {minAvailable: 1, selector: {matchLabels: {app: fccp-api}}}

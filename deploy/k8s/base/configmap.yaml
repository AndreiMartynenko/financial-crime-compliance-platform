apiVersion: v1
kind: ConfigMap
metadata: {name: fccp-config}
data:
  HTTP_ADDR: :8080
  HTTP_READ_HEADER_TIMEOUT: 5s
  HTTP_SHUTDOWN_TIMEOUT: 15s
  HTTP_RATE_LIMIT_RPS: "50"
  HTTP_RATE_LIMIT_BURST: "100"
  SCREENING_WORKER_INTERVAL: 1m
  SCREENING_JOB_LEASE: 5m
  SCREENING_PROVIDER_TIMEOUT: 5s
  SCREENING_PROVIDER_RETRIES: "2"
  SCREENING_PROVIDER_NAME: external-http-screening-v1
  SCREENING_PROVIDER_ALLOW_HTTP: "false"
  SMTP_HOST: ""
  SMTP_PORT: "587"
  SMTP_FROM: ""
  SMTP_STARTTLS: "true"
  JWT_AUTHORIZED_PARTY: fccp-web
  OTEL_SERVICE_NAME: fccp-api
  OIDC_CLIENT_ID: fccp-web
  OIDC_AUTHORITY: https://identity.example.com/realms/fccp
  JWT_ISSUER: https://identity.example.com/realms/fccp
  JWT_JWKS_URL: https://identity.example.com/realms/fccp/protocol/openid-connect/certs
  OTEL_EXPORTER_OTLP_ENDPOINT: http://otel-collector.monitoring:4318/v1/traces

apiVersion: apps/v1
kind: Deployment
metadata: {name: web, labels: {app: fccp-web}}
spec:
  replicas: 2
  selector: {matchLabels: {app: fccp-web}}
  template:
    metadata: {labels: {app: fccp-web}}
    spec:
      securityContext: {runAsNonRoot: true, runAsUser: 101, runAsGroup: 101, fsGroup: 101, seccompProfile: {type: RuntimeDefault}}
      volumes: [{name: runtime, emptyDir: {}}]
      containers:
        - name: web
          image: ghcr.io/andreimartynenko/financial-crime-compliance-platform-web:latest
          ports: [{name: http, containerPort: 8080}]
          envFrom: [{configMapRef: {name: fccp-config}}]
          readinessProbe: {httpGet: {path: /, port: http}, initialDelaySeconds: 3, periodSeconds: 10}
          resources: {requests: {cpu: 50m, memory: 64Mi}, limits: {cpu: 500m, memory: 256Mi}}
          securityContext: {allowPrivilegeEscalation: false, readOnlyRootFilesystem: true, capabilities: {drop: [ALL]}}
          volumeMounts: [{name: runtime, mountPath: /tmp}]
      terminationGracePeriodSeconds: 20
---
apiVersion: v1
kind: Service
metadata: {name: web}
spec: {selector: {app: fccp-web}, ports: [{name: http, port: 8080, targetPort: http}]}
---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata: {name: web}
spec: {minAvailable: 1, selector: {matchLabels: {app: fccp-web}}}

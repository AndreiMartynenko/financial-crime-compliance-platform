apiVersion: networking.k8s.io/v1
kind: Ingress
metadata: {name: fccp}
spec:
  tls: [{hosts: [staging.fccp.example.com], secretName: fccp-staging-tls}]
  rules:
    - host: staging.fccp.example.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend: {service: {name: web, port: {name: http}}}

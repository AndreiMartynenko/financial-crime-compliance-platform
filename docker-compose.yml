services:
  api:
    build: .
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy

  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: financial_crime
      POSTGRES_USER: financial_crime
      POSTGRES_PASSWORD: local_development_only
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U financial_crime -d financial_crime"]
      interval: 5s
      timeout: 3s
      retries: 10

volumes:
  postgres_data:

services:
  web:
    build: ./web
    ports:
      - "${WEB_PORT:-3000}:80"
    depends_on:
      - api

  api:
    build: .
    ports:
      - "${API_PORT:-8080}:8080"
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgres://financial_crime:local_development_only@postgres:5432/financial_crime?sslmode=disable
      HTTP_ADDR: :8080
      HTTP_READ_HEADER_TIMEOUT: 5s
      HTTP_SHUTDOWN_TIMEOUT: 10s
      JWT_ISSUER: financial-crime-compliance-platform
      JWT_SECRET: ${JWT_SECRET:-local-development-secret-change-me-123456}

  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: financial_crime
      POSTGRES_USER: financial_crime
      POSTGRES_PASSWORD: local_development_only
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U financial_crime -d financial_crime"]
      interval: 5s
      timeout: 3s
      retries: 10

volumes:
  postgres_data:

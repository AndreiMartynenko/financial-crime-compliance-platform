services:
  web:
    build: ./web
    ports:
      - "${WEB_PORT:-3000}:80"
    depends_on:
      - api
    environment:
      OIDC_AUTHORITY: ${OIDC_AUTHORITY:-http://localhost:8081/realms/fccp}
      OIDC_CLIENT_ID: fccp-web

  api:
    build: .
    ports:
      - "${API_PORT:-8080}:8080"
    depends_on:
      postgres:
        condition: service_healthy
      keycloak:
        condition: service_healthy
    environment:
      DATABASE_URL: postgres://financial_crime:local_development_only@postgres:5432/financial_crime?sslmode=disable
      HTTP_ADDR: :8080
      HTTP_READ_HEADER_TIMEOUT: 5s
      HTTP_SHUTDOWN_TIMEOUT: 10s
      SCREENING_WORKER_INTERVAL: ${SCREENING_WORKER_INTERVAL:-1m}
      JWT_ISSUER: ${OIDC_AUTHORITY:-http://localhost:8081/realms/fccp}
      JWT_JWKS_URL: http://keycloak:8080/realms/fccp/protocol/openid-connect/certs
      JWT_AUTHORIZED_PARTY: fccp-web

  keycloak:
    image: quay.io/keycloak/keycloak:26.7.0
    command: start-dev --import-realm
    ports:
      - "${KEYCLOAK_PORT:-8081}:8080"
    environment:
      KC_BOOTSTRAP_ADMIN_USERNAME: admin
      KC_BOOTSTRAP_ADMIN_PASSWORD: ${KEYCLOAK_ADMIN_PASSWORD:-local-admin-only}
      KC_HEALTH_ENABLED: "true"
    volumes:
      - ./deploy/keycloak:/opt/keycloak/data/import:ro
    healthcheck:
      test: ["CMD-SHELL", "bash -c \"exec 3<>/dev/tcp/127.0.0.1/9000; echo -e 'GET /health/ready HTTP/1.1\\r\\nhost: localhost\\r\\nConnection: close\\r\\n\\r\\n' >&3; grep -q '200 OK' <&3\""]
      interval: 10s
      timeout: 5s
      retries: 20

  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: financial_crime
      POSTGRES_USER: financial_crime
      POSTGRES_PASSWORD: local_development_only
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U financial_crime -d financial_crime"]
      interval: 5s
      timeout: 3s
      retries: 10

volumes:
  postgres_data:

openapi: 3.1.0
info:
  title: Financial Crime Compliance Platform API
  version: 0.20.0
  description: Portfolio API for authenticated customer-risk assessment, sanctions and PEP screening, financial transaction monitoring, and explainable alert investigation.
servers:
  - url: http://localhost:8080
paths:
  /healthz:
    get:
      operationId: healthCheck
      responses:
        "200":
          description: Service is healthy
  /readyz:
    get:
      operationId: readinessCheck
      responses:
        "200":
          description: API is ready and PostgreSQL is reachable
        "503":
          description: PostgreSQL is unavailable
  /metrics:
    get:
      operationId: prometheusMetrics
      summary: Export operational metrics in Prometheus text format
      security: [{metricsAuth: []}]
      responses:
        "200": {description: Prometheus metrics}
  /v1/customers:
    get:
      operationId: listCustomers
      summary: List customers using stable cursor pagination
      security: [{bearerAuth: []}]
      parameters:
        - {$ref: "#/components/parameters/PageSize"}
        - {$ref: "#/components/parameters/PageToken"}
        - in: query
          name: status
          schema: {type: string, enum: [pending_approval, active, rejected]}
      responses:
        "200":
          description: Customer page
          content:
            application/json:
              schema: {$ref: "#/components/schemas/CustomerPage"}
        "401": {description: Authentication required}
        "403": {description: Role is not authorized}
        "422": {description: Invalid filter or page cursor}
    post:
      operationId: onboardCustomer
      summary: Onboard and risk-assess a customer
      description: Requires the `analyst` or `admin` role. The JWT subject is recorded as the audit actor.
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/OnboardCustomer"
      responses:
        "201":
          description: Customer created, assessed, and submitted for independent approval
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Customer"
        "400": {description: Malformed JSON}
        "401":
          description: Missing, invalid, or expired bearer token
          content:
            application/json:
              schema: {$ref: "#/components/schemas/Error"}
        "403":
          description: Authenticated role is not allowed to onboard customers
          content:
            application/json:
              schema: {$ref: "#/components/schemas/Error"}
        "422": {description: Customer validation failed}
        "500":
          description: Customer and audit event could not be persisted; the transaction is rolled back
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
  /v1/customers/{customer_id}:
    get:
      operationId: getCustomer
      summary: Get a customer
      security: [{bearerAuth: []}]
      parameters: [{$ref: "#/components/parameters/CustomerID"}]
      responses:
        "200":
          description: Customer details
          content:
            application/json:
              schema: {$ref: "#/components/schemas/Customer"}
        "404": {description: Customer not found}
  /v1/customers/{customer_id}/transactions:
    get:
      operationId: listCustomerTransactions
      summary: List customer transactions
      security: [{bearerAuth: []}]
      parameters:
        - {$ref: "#/components/parameters/CustomerID"}
        - {$ref: "#/components/parameters/PageSize"}
        - {$ref: "#/components/parameters/PageToken"}
      responses:
        "200":
          description: Transaction page
          content:
            application/json:
              schema: {$ref: "#/components/schemas/TransactionPage"}
  /v1/customers/{customer_id}/audit-events:
    get:
      operationId: listCustomerAuditEvents
      summary: List customer audit trail
      security: [{bearerAuth: []}]
      parameters:
        - {$ref: "#/components/parameters/CustomerID"}
        - {$ref: "#/components/parameters/PageSize"}
        - {$ref: "#/components/parameters/PageToken"}
      responses:
        "200":
          description: Audit-event page
          content:
            application/json:
              schema: {$ref: "#/components/schemas/AuditEventPage"}
  /v1/customers/{customer_id}/activity:
    get:
      operationId: listCustomerActivity
      summary: List the unified customer activity stream
      description: Returns audit events for the customer and every related transaction, alert and investigation case.
      security: [{bearerAuth: []}]
      parameters:
        - {$ref: "#/components/parameters/CustomerID"}
        - {$ref: "#/components/parameters/PageSize"}
        - {$ref: "#/components/parameters/PageToken"}
      responses:
        "200":
          description: Stable cursor-paginated Customer 360 activity
          content:
            application/json:
              schema: {$ref: "#/components/schemas/AuditEventPage"}
        "404": {description: Customer not found}
        "422": {description: Invalid pagination cursor}
  /v1/customers/{customer_id}/due-diligence:
    get:
      operationId: getDueDiligence
      summary: Get the CDD profile, beneficial owners and KYC documents
      security: [{bearerAuth: []}]
      parameters: [{$ref: "#/components/parameters/CustomerID"}]
      responses:
        "200": {description: Customer due-diligence record, content: {application/json: {schema: {$ref: "#/components/schemas/DueDiligenceDetails"}}}}
        "404": {description: Customer not found}
    put:
      operationId: updateDueDiligence
      summary: Create or update a CDD profile
      description: Requires analyst or admin role. The profile and audit event are persisted atomically.
      security: [{bearerAuth: []}]
      parameters: [{$ref: "#/components/parameters/CustomerID"}]
      requestBody: {required: true, content: {application/json: {schema: {$ref: "#/components/schemas/CDDProfile"}}}}
      responses:
        "200": {description: CDD profile updated, content: {application/json: {schema: {$ref: "#/components/schemas/CDDProfile"}}}}
        "422": {description: CDD profile failed validation}
  /v1/customers/{customer_id}/beneficial-owners:
    post:
      operationId: addBeneficialOwner
      summary: Record a beneficial owner
      security: [{bearerAuth: []}]
      parameters: [{$ref: "#/components/parameters/CustomerID"}]
      requestBody: {required: true, content: {application/json: {schema: {$ref: "#/components/schemas/BeneficialOwner"}}}}
      responses:
        "201": {description: Owner and audit event created atomically, content: {application/json: {schema: {$ref: "#/components/schemas/BeneficialOwner"}}}}
  /v1/customers/{customer_id}/kyc-documents:
    post:
      operationId: addKYCDocument
      summary: Register KYC document evidence
      security: [{bearerAuth: []}]
      parameters: [{$ref: "#/components/parameters/CustomerID"}]
      requestBody: {required: true, content: {application/json: {schema: {$ref: "#/components/schemas/KYCDocument"}}}}
      responses:
        "201": {description: Pending document and audit event created atomically, content: {application/json: {schema: {$ref: "#/components/schemas/KYCDocument"}}}}
  /v1/kyc-documents/{document_id}/review:
    post:
      operationId: reviewKYCDocument
      summary: Independently verify or reject KYC evidence
      description: Requires reviewer or admin role.
      security: [{bearerAuth: []}]
      parameters:
        - in: path
          name: document_id
          required: true
          schema: {type: string, format: uuid}
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [status]
              properties: {status: {type: string, enum: [verified, rejected]}}
      responses:
        "200": {description: Document reviewed, content: {application/json: {schema: {$ref: "#/components/schemas/KYCDocument"}}}}
        "409": {description: Document is not pending}
  /v1/customers/{customer_id}/screenings:
    post:
      operationId: screenCustomer
      summary: Screen a customer and their beneficial owners
      description: Requires analyst or admin role. Runs the configured provider and persists runs, potential matches and audit events atomically.
      security: [{bearerAuth: []}]
      parameters: [{$ref: "#/components/parameters/CustomerID"}]
      responses:
        "201": {description: Screening completed, content: {application/json: {schema: {$ref: "#/components/schemas/ScreeningResult"}}}}
        "404": {description: Customer not found}
        "500": {description: Screening result could not be persisted}
  /v1/customers/{customer_id}/screening-matches:
    get:
      operationId: listScreeningMatches
      summary: List screening matches for a customer
      security: [{bearerAuth: []}]
      parameters: [{$ref: "#/components/parameters/CustomerID"}]
      responses:
        "200": {description: Screening-match history, content: {application/json: {schema: {$ref: "#/components/schemas/ScreeningMatchPage"}}}}
  /v1/screening-matches/{match_id}/disposition:
    post:
      operationId: dispositionScreeningMatch
      summary: Confirm or dismiss a potential screening match
      description: Requires reviewer or admin role. A reason is mandatory and the disposition is audit logged.
      security: [{bearerAuth: []}]
      parameters:
        - in: path
          name: match_id
          required: true
          schema: {type: string, format: uuid}
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [status, reason]
              properties:
                status: {type: string, enum: [confirmed, false_positive]}
                reason: {type: string, minLength: 1}
      responses:
        "200": {description: Match disposition recorded, content: {application/json: {schema: {$ref: "#/components/schemas/ScreeningMatch"}}}}
        "409": {description: Match is no longer pending review}
        "422": {description: Invalid status or missing reason}
  /v1/customers/{customer_id}/screening-schedule:
    get:
      operationId: getScreeningSchedule
      summary: Get ongoing screening configuration
      security: [{bearerAuth: []}]
      parameters: [{$ref: "#/components/parameters/CustomerID"}]
      responses:
        "200": {description: Screening schedule, content: {application/json: {schema: {$ref: "#/components/schemas/ScreeningSchedule"}}}}
        "404": {description: Ongoing screening is not configured}
    put:
      operationId: updateScreeningSchedule
      summary: Enable, pause or change ongoing screening
      description: Requires analyst or admin role. The schedule and audit event are persisted atomically.
      security: [{bearerAuth: []}]
      parameters: [{$ref: "#/components/parameters/CustomerID"}]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [enabled, interval_hours]
              properties:
                enabled: {type: boolean}
                interval_hours: {type: integer, minimum: 1, maximum: 8760}
      responses:
        "200": {description: Schedule updated, content: {application/json: {schema: {$ref: "#/components/schemas/ScreeningSchedule"}}}}
        "422": {description: Invalid cadence}
  /v1/notifications:
    get:
      operationId: listNotifications
      summary: List operational notifications with unread items first
      security: [{bearerAuth: []}]
      responses:
        "200": {description: Notification inbox, content: {application/json: {schema: {$ref: "#/components/schemas/NotificationPage"}}}}
  /v1/notifications/{notification_id}/read:
    post:
      operationId: readNotification
      summary: Mark a notification as read
      security: [{bearerAuth: []}]
      parameters:
        - in: path
          name: notification_id
          required: true
          schema: {type: string, format: uuid}
      responses:
        "200": {description: Notification updated, content: {application/json: {schema: {$ref: "#/components/schemas/Notification"}}}}
        "404": {description: Notification not found}
  /v1/customers/{customer_id}/approve:
    post:
      operationId: approveCustomer
      summary: Approve a pending customer
      description: Requires the `reviewer` or `admin` role. The original maker cannot approve their own submission.
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/CustomerID"
      requestBody:
        content:
          application/json:
            schema: {$ref: "#/components/schemas/ReviewCustomer"}
      responses:
        "200":
          description: Customer approved and activated
          content:
            application/json:
              schema: {$ref: "#/components/schemas/Customer"}
        "400": {description: Malformed JSON}
        "401": {description: Missing, invalid, or expired bearer token}
        "403": {description: Authenticated role cannot review customers}
        "404": {description: Customer not found}
        "409": {description: Maker-checker violation or customer is no longer pending}
        "500": {description: Review could not be persisted; the transaction is rolled back}
  /v1/customers/{customer_id}/reject:
    post:
      operationId: rejectCustomer
      summary: Reject a pending customer
      description: Requires the `reviewer` or `admin` role. The original maker cannot reject their own submission.
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/CustomerID"
      requestBody:
        content:
          application/json:
            schema: {$ref: "#/components/schemas/ReviewCustomer"}
      responses:
        "200":
          description: Customer rejected
          content:
            application/json:
              schema: {$ref: "#/components/schemas/Customer"}
        "400": {description: Malformed JSON}
        "401": {description: Missing, invalid, or expired bearer token}
        "403": {description: Authenticated role cannot review customers}
        "404": {description: Customer not found}
        "409": {description: Maker-checker violation or customer is no longer pending}
        "500": {description: Review could not be persisted; the transaction is rolled back}
  /v1/transactions:
    post:
      operationId: ingestTransaction
      summary: Ingest a financial transaction for an active customer
      description: Requires the `analyst` or `admin` role. Monetary values use integer minor units to avoid floating-point rounding.
      security:
        - bearerAuth: []
      parameters:
        - in: header
          name: Idempotency-Key
          required: true
          description: Stable request key. An exact replay returns the original result; a different payload returns 409.
          schema: {type: string, minLength: 1, maxLength: 200}
      requestBody:
        required: true
        content:
          application/json:
            schema: {$ref: "#/components/schemas/IngestTransaction"}
      responses:
        "200":
          description: Idempotent replay of an existing transaction; `Idempotency-Replayed` is `true`
          headers:
            Idempotency-Replayed:
              schema: {type: string, enum: ["true"]}
          content:
            application/json:
              schema: {$ref: "#/components/schemas/TransactionIngestionResult"}
        "201":
          description: Transaction and its audit event were persisted atomically
          content:
            application/json:
              schema: {$ref: "#/components/schemas/TransactionIngestionResult"}
        "400": {description: Malformed JSON}
        "401": {description: Missing, invalid, or expired bearer token}
        "403": {description: Authenticated role cannot ingest transactions}
        "404": {description: Customer not found}
        "409": {description: Customer is not active, or the idempotency key was used with a different payload}
        "422": {description: Transaction validation failed}
        "500": {description: Transaction could not be persisted; the transaction is rolled back}
  /v1/alerts:
    get:
      operationId: listAlerts
      summary: List monitoring alerts
      security:
        - bearerAuth: []
      parameters:
        - in: query
          name: status
          schema: {type: string, enum: [open, closed]}
        - {$ref: "#/components/parameters/PageSize"}
        - {$ref: "#/components/parameters/PageToken"}
      responses:
        "200":
          description: Monitoring alerts ordered newest first
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AlertPage"
        "401": {description: Missing, invalid, or expired bearer token}
        "403": {description: Authenticated role cannot view alerts}
        "422": {description: Invalid status filter}
        "500": {description: Alerts could not be listed}
  /v1/alerts/{alert_id}/close:
    post:
      operationId: closeAlert
      summary: Close an open monitoring alert
      description: Requires the `reviewer` or `admin` role and a closure reason.
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: alert_id
          required: true
          schema: {type: string, format: uuid}
      requestBody:
        required: true
        content:
          application/json:
            schema: {$ref: "#/components/schemas/CloseAlert"}
      responses:
        "200":
          description: Alert closed with an atomic audit write
          content:
            application/json:
              schema: {$ref: "#/components/schemas/Alert"}
        "400": {description: Malformed JSON}
        "401": {description: Missing, invalid, or expired bearer token}
        "403": {description: Authenticated role cannot close alerts}
        "404": {description: Alert not found}
        "409": {description: Alert is already closed}
        "422": {description: Closure reason is missing}
        "500": {description: Alert closure could not be persisted; the transaction is rolled back}
  /v1/cases:
    get:
      operationId: listCases
      summary: List investigation cases
      security: [{bearerAuth: []}]
      parameters:
        - in: query
          name: status
          schema: {type: string, enum: [open, in_progress, resolved]}
        - {$ref: "#/components/parameters/PageSize"}
        - {$ref: "#/components/parameters/PageToken"}
      responses:
        "200":
          description: Investigation case page
          content:
            application/json:
              schema: {$ref: "#/components/schemas/CasePage"}
    post:
      operationId: createCase
      summary: Open an investigation case for an alert
      security: [{bearerAuth: []}]
      requestBody:
        required: true
        content:
          application/json:
            schema: {$ref: "#/components/schemas/CreateCase"}
      responses:
        "201":
          description: Case and audit event created atomically
          content:
            application/json:
              schema: {$ref: "#/components/schemas/InvestigationCase"}
        "404": {description: Alert not found}
        "409": {description: Alert is closed or already belongs to a case}
        "422": {description: Case data failed validation}
  /v1/cases/{case_id}:
    get:
      operationId: getCase
      summary: Get an investigation with comments and audit timeline
      security: [{bearerAuth: []}]
      parameters: [{$ref: "#/components/parameters/CaseID"}]
      responses:
        "200":
          description: Investigation workspace details
          content:
            application/json:
              schema: {$ref: "#/components/schemas/CaseDetails"}
        "404": {description: Case not found}
  /v1/cases/{case_id}/assign:
    post:
      operationId: assignCase
      summary: Assign an investigator
      description: Requires reviewer or admin role and moves an open case to `in_progress`.
      security: [{bearerAuth: []}]
      parameters: [{$ref: "#/components/parameters/CaseID"}]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [assignee]
              properties:
                assignee: {type: string, minLength: 1, maxLength: 200}
      responses:
        "200": {description: Case assigned, content: {application/json: {schema: {$ref: "#/components/schemas/InvestigationCase"}}}}
        "404": {description: Case not found}
        "409": {description: Case is resolved}
  /v1/cases/{case_id}/comments:
    post:
      operationId: addCaseComment
      summary: Add an investigation note
      security: [{bearerAuth: []}]
      parameters: [{$ref: "#/components/parameters/CaseID"}]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [body]
              properties:
                body: {type: string, minLength: 1, maxLength: 4000}
      responses:
        "201": {description: Comment and audit event created atomically, content: {application/json: {schema: {$ref: "#/components/schemas/CaseComment"}}}}
        "404": {description: Case not found}
        "409": {description: Case is resolved}
  /v1/cases/{case_id}/resolve:
    post:
      operationId: resolveCase
      summary: Resolve a case and close its linked alert
      description: Requires reviewer or admin role. The case, alert and both audit events are updated atomically.
      security: [{bearerAuth: []}]
      parameters: [{$ref: "#/components/parameters/CaseID"}]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [resolution]
              properties:
                resolution: {type: string, minLength: 1, maxLength: 4000}
      responses:
        "200": {description: Case resolved, content: {application/json: {schema: {$ref: "#/components/schemas/InvestigationCase"}}}}
        "404": {description: Case not found}
        "409": {description: Case or linked alert is already closed}
components:
  parameters:
    PageSize:
      in: query
      name: page_size
      schema: {type: integer, minimum: 1, maximum: 100, default: 25}
    PageToken:
      in: query
      name: page_token
      schema: {type: string}
      description: Opaque cursor returned as `next_page_token` by the previous page.
    CustomerID:
      in: path
      name: customer_id
      required: true
      schema: {type: string, format: uuid}
    CaseID:
      in: path
      name: case_id
      required: true
      schema: {type: string, format: uuid}
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: RS256 access token issued through OIDC Authorization Code + PKCE. The API validates JWKS signature, issuer, authorized party, expiry and realm roles.
    metricsAuth:
      type: http
      scheme: bearer
      description: Separate operations credential configured through `METRICS_TOKEN`.
  schemas:
    Error:
      type: object
      required: [error]
      properties:
        error:
          type: object
          required: [code, message]
          properties:
            code: {type: string}
            message: {type: string}
    OnboardCustomer:
      type: object
      required: [type, legal_name, country_code, risk_factors]
      properties:
        external_ref: {type: string}
        type: {type: string, enum: [individual, company]}
        legal_name: {type: string}
        country_code: {type: string, minLength: 2, maxLength: 2}
        risk_factors:
          $ref: "#/components/schemas/RiskFactors"
    ReviewCustomer:
      type: object
      properties:
        reason: {type: string}
    IngestTransaction:
      type: object
      required: [customer_id, direction, amount_minor, currency, counterparty_country, occurred_at]
      properties:
        external_ref: {type: string}
        customer_id: {type: string, format: uuid}
        direction: {type: string, enum: [inbound, outbound]}
        amount_minor: {type: integer, format: int64, minimum: 1}
        currency: {type: string, minLength: 3, maxLength: 3, example: GBP}
        counterparty_country: {type: string, minLength: 2, maxLength: 2, example: DE}
        occurred_at: {type: string, format: date-time}
    Transaction:
      allOf:
        - $ref: "#/components/schemas/IngestTransaction"
        - type: object
          required: [id, ingested_at, ingested_by]
          properties:
            id: {type: string, format: uuid}
            ingested_at: {type: string, format: date-time}
            ingested_by: {type: string}
    TransactionIngestionResult:
      type: object
      required: [transaction, alerts]
      properties:
        transaction: {$ref: "#/components/schemas/Transaction"}
        alerts:
          type: array
          items: {$ref: "#/components/schemas/Alert"}
    Alert:
      type: object
      required: [id, transaction_id, customer_id, rule_code, rule_version, severity, status, reason_code, description, created_at]
      properties:
        id: {type: string, format: uuid}
        transaction_id: {type: string, format: uuid}
        customer_id: {type: string, format: uuid}
        rule_code: {type: string}
        rule_version: {type: string, example: transaction-monitoring-v1}
        severity: {type: string, enum: [medium, high]}
        status: {type: string, enum: [open, closed]}
        reason_code: {type: string}
        description: {type: string}
        created_at: {type: string, format: date-time}
        closed_at: {type: string, format: date-time}
        closed_by: {type: string}
        closure_reason: {type: string}
    CloseAlert:
      type: object
      required: [reason]
      properties:
        reason: {type: string, minLength: 1}
    CustomerPage:
      type: object
      required: [items]
      properties:
        items: {type: array, items: {$ref: "#/components/schemas/Customer"}}
        next_page_token: {type: string}
    TransactionPage:
      type: object
      required: [items]
      properties:
        items: {type: array, items: {$ref: "#/components/schemas/Transaction"}}
        next_page_token: {type: string}
    AlertPage:
      type: object
      required: [items]
      properties:
        items: {type: array, items: {$ref: "#/components/schemas/Alert"}}
        next_page_token: {type: string}
    AuditEvent:
      type: object
      required: [id, aggregate_type, aggregate_id, event_type, actor, occurred_at, payload]
      properties:
        id: {type: string, format: uuid}
        aggregate_type: {type: string, enum: [customer, transaction, alert, case]}
        aggregate_id: {type: string, format: uuid}
        event_type: {type: string}
        actor: {type: string}
        occurred_at: {type: string, format: date-time}
        payload: {type: object, additionalProperties: true}
    AuditEventPage:
      type: object
      required: [items]
      properties:
        items: {type: array, items: {$ref: "#/components/schemas/AuditEvent"}}
        next_page_token: {type: string}
    CreateCase:
      type: object
      required: [alert_id, title, priority]
      properties:
        alert_id: {type: string, format: uuid}
        title: {type: string, minLength: 1, maxLength: 200}
        priority: {type: string, enum: [low, medium, high]}
    InvestigationCase:
      type: object
      required: [id, alert_id, customer_id, title, priority, status, created_by, created_at, updated_at]
      properties:
        id: {type: string, format: uuid}
        alert_id: {type: string, format: uuid}
        customer_id: {type: string, format: uuid}
        title: {type: string}
        priority: {type: string, enum: [low, medium, high]}
        status: {type: string, enum: [open, in_progress, resolved]}
        assigned_to: {type: string}
        resolution: {type: string}
        created_by: {type: string}
        created_at: {type: string, format: date-time}
        updated_at: {type: string, format: date-time}
        resolved_by: {type: string}

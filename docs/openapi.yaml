openapi: 3.1.0
info:
  title: Financial Crime Compliance Platform API
  version: 0.4.0
  description: Portfolio API for authenticated, maker-checker controlled AML/KYC customer-risk assessment with transactional PostgreSQL persistence.
servers:
  - url: http://localhost:8080
paths:
  /healthz:
    get:
      operationId: healthCheck
      responses:
        "200":
          description: Service is healthy
  /v1/customers:
    post:
      operationId: onboardCustomer
      summary: Onboard and risk-assess a customer
      description: Requires the `analyst` or `admin` role. The JWT subject is recorded as the audit actor.
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/OnboardCustomer"
      responses:
        "201":
          description: Customer created, assessed, and submitted for independent approval
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Customer"
        "400": {description: Malformed JSON}
        "401":
          description: Missing, invalid, or expired bearer token
          content:
            application/json:
              schema: {$ref: "#/components/schemas/Error"}
        "403":
          description: Authenticated role is not allowed to onboard customers
          content:
            application/json:
              schema: {$ref: "#/components/schemas/Error"}
        "422": {description: Customer validation failed}
        "500":
          description: Customer and audit event could not be persisted; the transaction is rolled back
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
  /v1/customers/{customer_id}/approve:
    post:
      operationId: approveCustomer
      summary: Approve a pending customer
      description: Requires the `reviewer` or `admin` role. The original maker cannot approve their own submission.
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/CustomerID"
      requestBody:
        content:
          application/json:
            schema: {$ref: "#/components/schemas/ReviewCustomer"}
      responses:
        "200":
          description: Customer approved and activated
          content:
            application/json:
              schema: {$ref: "#/components/schemas/Customer"}
        "400": {description: Malformed JSON}
        "401": {description: Missing, invalid, or expired bearer token}
        "403": {description: Authenticated role cannot review customers}
        "404": {description: Customer not found}
        "409": {description: Maker-checker violation or customer is no longer pending}
        "500": {description: Review could not be persisted; the transaction is rolled back}
  /v1/customers/{customer_id}/reject:
    post:
      operationId: rejectCustomer
      summary: Reject a pending customer
      description: Requires the `reviewer` or `admin` role. The original maker cannot reject their own submission.
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/CustomerID"
      requestBody:
        content:
          application/json:
            schema: {$ref: "#/components/schemas/ReviewCustomer"}
      responses:
        "200":
          description: Customer rejected
          content:
            application/json:
              schema: {$ref: "#/components/schemas/Customer"}
        "400": {description: Malformed JSON}
        "401": {description: Missing, invalid, or expired bearer token}
        "403": {description: Authenticated role cannot review customers}
        "404": {description: Customer not found}
        "409": {description: Maker-checker violation or customer is no longer pending}
        "500": {description: Review could not be persisted; the transaction is rolled back}
components:
  parameters:
    CustomerID:
      in: path
      name: customer_id
      required: true
      schema: {type: string, format: uuid}
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: HS256 JWT containing `sub`, `role`, `iss`, and `exp`. Supported roles are analyst, reviewer, and admin.
  schemas:
    Error:
      type: object
      required: [error]
      properties:
        error:
          type: object
          required: [code, message]
          properties:
            code: {type: string}
            message: {type: string}
    OnboardCustomer:
      type: object
      required: [type, legal_name, country_code, risk_factors]
      properties:
        external_ref: {type: string}
        type: {type: string, enum: [individual, company]}
        legal_name: {type: string}
        country_code: {type: string, minLength: 2, maxLength: 2}
        risk_factors:
          $ref: "#/components/schemas/RiskFactors"
    ReviewCustomer:
      type: object
      properties:
        reason: {type: string}
    RiskFactors:
      type: object
      required: [country_risk, source_of_funds_verified]
      properties:
        country_risk: {type: string, enum: [low, medium, high]}
        pep: {type: boolean}
        sanctions_potential_match: {type: boolean}
        high_risk_industry: {type: boolean}
        complex_ownership: {type: boolean}
        source_of_funds_verified: {type: boolean}
    Customer:
      type: object
      required: [id, type, legal_name, country_code, risk_factors, risk_assessment, status, created_by, created_at]
      properties:
        id: {type: string, format: uuid}
        external_ref: {type: string}
        type: {type: string, enum: [individual, company]}
        legal_name: {type: string}
        country_code: {type: string}
        status: {type: string, enum: [pending_approval, active, rejected]}
        created_by: {type: string}
        reviewed_by: {type: string}
        reviewed_at: {type: string, format: date-time}
        risk_factors: {$ref: "#/components/schemas/RiskFactors"}
        risk_assessment:
          type: object
          properties:
            score: {type: integer}
            rating: {type: string, enum: [low, medium, high]}
            due_diligence: {type: string, enum: [standard, enhanced, blocked_pending_review]}
            reasons:
              type: array
              items:
                type: object
                properties:
                  code: {type: string}
                  points: {type: integer}
                  detail: {type: string}
            assessed_at: {type: string, format: date-time}
            rule_version: {type: string}
        created_at: {type: string, format: date-time}
